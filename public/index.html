<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <meta http-equiv="Expires" content="0">
    <title>News Scrapper</title>

    <!-- Bootstrap core CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css">

        <!-- Bootstrap colorextension CSS -->
    <link rel="stylesheet" href="./css/bootstrap-color-extension.css">

    <!-- Google Fonts-->
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

    <!-- Favicon Emoji -->
    <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📰</text></svg>">
    <style>
      :root {
        --bg-color: #111;
        --text-color: #ddd;
        --card-bg: #333;
        --header-footer-bg: #222;
        --muted-text: #6c757d;
        --border-gradient: radial-gradient(circle at top left, #f00, #3020ff);
        --hero-gradient: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      }

      [data-theme="light"] {
        --bg-color: #f8f9fa;
        --text-color: #212529;
        --card-bg: #ffffff;
        --header-footer-bg: #e9ecef;
        --muted-text: #6c757d;
        --border-gradient: radial-gradient(circle at top left, #ff7e5f, #feb47b);
        --hero-gradient: linear-gradient(135deg, #e9ecef 0%, #dee2e6 100%);
      }

      .card-body::-webkit-scrollbar {width: 6px;}
      .card-body::-webkit-scrollbar-thumb {background: rgb(98, 98, 98);border-radius: 3px;}
      .card-body::-webkit-scrollbar-thumb:hover {background:  #ddd;}
      .card-body::-webkit-scrollbar-track {background: var(--card-bg);}
      .card-body{background-color: var(--card-bg);}
      .card-footer{background-color: var(--header-footer-bg);}
      .card-header{background-color: var(--header-footer-bg);}
      .card{
        min-height: 700px;
        max-height: 700px;
        border: double 2px transparent;
        border-radius: 8px;
        background-image: linear-gradient(var(--card-bg), var(--card-bg)), var(--border-gradient);
        background-origin: border-box;
        background-clip: padding-box, border-box;
        transition: transform 0.2s, background-image 0.3s;
      }
      .card:hover { transform: translateY(-5px); }
      body{background-color: var(--bg-color); color: var(--text-color); font-family: 'Roboto', sans-serif; transition: background-color 0.3s, color 0.3s;}

      #loader {
        display: none;
        text-align: center;
        padding: 20px;
      }
      .spinner-border {
        width: 3rem;
        height: 3rem;
      }
      .hero-section {
        background: var(--hero-gradient);
        padding: 40px 0;
        border-bottom: 1px solid #34495e;
        transition: background 0.3s;
      }

      /* Switch de Tema */
      .theme-switch-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-top: 15px;
      }
      .theme-switch {
        display: inline-block;
        height: 28px;
        position: relative;
        width: 50px;
      }
      .theme-switch input { display: none; }
      .slider {
        background-color: #ccc;
        bottom: 0;
        cursor: pointer;
        left: 0;
        position: absolute;
        right: 0;
        top: 0;
        transition: .4s;
        border-radius: 34px;
      }
      .slider:before {
        background-color: white;
        bottom: 4px;
        content: "";
        height: 20px;
        left: 4px;
        position: absolute;
        transition: .4s;
        width: 20px;
        border-radius: 50%;
      }
      input:checked + .slider { background-color: #2196F3; }
      input:checked + .slider:before { transform: translateX(22px); }
      .emoji-toggle { font-size: 1.2rem; cursor: pointer; }

      /* Mejora del Select */
      .input-group-text {
        background-color: var(--header-footer-bg);
        color: var(--text-color);
        border: 1px solid rgba(128, 128, 128, 0.2);
        font-weight: 500;
      }
      .form-select {
        background-color: var(--card-bg);
        color: var(--text-color);
        border: 1px solid rgba(128, 128, 128, 0.2);
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .form-select:focus {
        background-color: var(--card-bg);
        color: var(--text-color);
        border-color: #2196F3;
        box-shadow: 0 0 0 0.25rem rgba(33, 150, 243, 0.25);
      }
      .form-select:hover {
        border-color: rgba(33, 150, 243, 0.5);
      }
      option {
        background-color: var(--card-bg);
        color: var(--text-color);
      }

      /* Resaltado de TTS */
      .tts-chunk {
        transition: background-color 0.2s, color 0.2s;
        padding: 1px 2px;
        border-radius: 4px;
        cursor: default;
      }
      .tts-active {
        background-color: rgba(255, 193, 7, 0.45);
        color: #fff;
        box-shadow: 0 0 8px rgba(255, 193, 7, 0.3);
      }
      [data-theme="light"] .tts-active {
        background-color: rgba(255, 193, 7, 0.6);
        color: #000;
      }
    </style>
  </head>

    <!-- Bootstrap JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      // Variables globales para voces
      let voices = [];
      const voiceSelect = document.getElementById('voiceSelect');
      const rateRange = document.getElementById('rateRange');
      const pitchRange = document.getElementById('pitchRange');
      const rateValue = document.getElementById('rateValue');
      const pitchValue = document.getElementById('pitchValue');

      function loadVoices() {
        voices = window.speechSynthesis.getVoices();
        voiceSelect.innerHTML = '';

        // Filtrar solo voces en español para que sea más fácil elegir
        const spanishVoices = voices.filter(v => v.lang.startsWith('es'));

        spanishVoices.forEach((voice, i) => {
          const option = document.createElement('option');
          option.textContent = `${voice.name} (${voice.lang})`;
          option.value = voice.name;
          // Intentar preseleccionar Argentina o la primera en español
          if (voice.lang === 'es-US') option.selected = true;
          voiceSelect.appendChild(option);
        });

        // Si no hay voces en español cargadas todavía (a veces tarda en Chrome), reintentar
        if (spanishVoices.length === 0) {
          setTimeout(loadVoices, 100);
        }
      }

      // Eventos para actualizar etiquetas de rango
      rateRange.oninput = () => rateValue.innerText = rateRange.value;
      pitchRange.oninput = () => pitchValue.innerText = pitchRange.value;

      // Cargar voces cuando cambien o al inicio
      window.speechSynthesis.onvoiceschanged = loadVoices;
      loadVoices();

      function probarVoz() {
        window.speechSynthesis.cancel();
        const testUtterance = new SpeechSynthesisUtterance("Probando la configuración de voz en News Scrapper.");
        const selectedVoice = voices.find(v => v.name === voiceSelect.value);
        if (selectedVoice) testUtterance.voice = selectedVoice;
        testUtterance.rate = rateRange.value;
        testUtterance.pitch = pitchRange.value;
        window.speechSynthesis.speak(testUtterance);
      }

      // Carga inicial
      actualizarYMostrar(document.getElementById('medios').value)

      async function actualizarYMostrar(medio) {
        const noticiasContainer = document.querySelector('#noticias')
        const loader = document.querySelector('#loader')

        // 1. Mostrar loader y limpiar contenedor
        noticiasContainer.innerHTML = ''
        loader.style.display = 'block'

        try {
          // 2. Disparar el scraping en tiempo real en el servidor
          console.log('Solicitando noticias en tiempo real para:', medio)
          const scrapResponse = await fetch(`/api/scrap/${medio}`)
          const scrapResult = await scrapResponse.json()

          if (!scrapResponse.ok) throw new Error(scrapResult.error)

          console.log('Servidor procesando:', scrapResult.message)

          // 3. Obtener los nuevos datos del JSON
          const dataResponse = await fetch(`./json/${medio}?t=${Date.now()}`) // Cache busting
          const ultimasNoticias = await dataResponse.json()

          // 5. Renderizar
          renderizarNoticias(ultimasNoticias)
        } catch (error) {
          console.error('Error:', error)
          noticiasContainer.innerHTML = `
            <div class="col-12 text-center mt-5">
              <div class="alert alert-danger">
                Error al actualizar las noticias: ${error.message}
              </div>
            </div>`
        } finally {
          loader.style.display = 'none'
        }
      }

      function renderizarNoticias(ultimasNoticias) {
        const noticiasContainer = document.querySelector('#noticias')
        const resultados = ultimasNoticias.length

        if (resultados === 0) {
          noticiasContainer.innerHTML = '<div class="col-12 text-center mt-5"><h4>No se encontraron noticias recientes para este medio.</h4></div>'
          return
        }

        // Guardar las noticias globalmente para que la función de lectura pueda acceder a ellas
        window.currentNews = ultimasNoticias;

        let htmlContent = ''
        for(let i = 0; i < ultimasNoticias.length; i++){
          const noticia = ultimasNoticias[i];
          let imagenNoticia = ''
          const botones = `
            <div class="d-flex gap-1 justify-content-end">
              <button onclick="leerNoticia(${i})" class="btn btn-outline-night btn-sm" title="Escuchar noticia">🔊</button>
              <a href='${noticia.link}' class="btn btn-outline-primary btn-sm" target="_blank">Ver</a>
              <a href='https://www.google.com/search?q=${encodeURIComponent(noticia.titular)}' class="btn btn-outline-info btn-sm" target="_blank">Buscar</a>
            </div>`

          if(noticia.imagen){
            imagenNoticia = `<div class="col"><img src="${noticia.imagen}" class="img-fluid rounded" alt="${noticia.titular}" onerror="this.src='./img/No-Image-Placeholder.svg'"></div>`
          } else {
            imagenNoticia = `<div class="col"><img src="./img/No-Image-Placeholder.svg" class="img-fluid rounded" alt="Sin imagen"></div>`
          }

          htmlContent += `
            <div class="col-md-3 mb-4">
              <div class="card">
                <div class="card-header">
                  <div class="row align-items-center">
                    <div class="col-6">
                      <h5 class="mb-0 small">${noticia.medio}</h5>
                      <span class="fst-italic smaller">${noticia.fechaArticulo || 'Sin fecha'}</span>
                    </div>
                    <div class="col-6 p-0">
                      ${botones}
                    </div>
                  </div>
                </div>
                <div class="card-body overflow-auto">
                  <h4 class="h5">${noticia.titular}</h4>
                  <p class="small text-secondary mb-3">${noticia.resumen || ''}</p>
                  <div class="row mb-3">
                    ${imagenNoticia}
                  </div>
                  <p class="small">${noticia.articulo.slice(0, 350)}...</p>
                </div>
                <div class="card-footer">
                  <div class="d-flex justify-content-between align-items-center">
                    <span class="smaller">${noticia.indice} de ${resultados}</span>
                    <span class="smaller">Visto: ${timeConverter(noticia.fechaObtenido)}</span>
                  </div>
                </div>
              </div>
            </div>`
        }
        noticiasContainer.innerHTML = htmlContent
      }

      function leerNoticia(index) {
        if (!window.currentNews || !window.currentNews[index]) return;

        const noticia = window.currentNews[index];
        const modalEl = document.getElementById('modalLectura');
        const bsModal = new bootstrap.Modal(modalEl);
        const btnCerrar = document.getElementById('btnCerrarModal');

        // Contenedores
        const containers = {
          titular: document.getElementById('modalTitular'),
          resumen: document.getElementById('modalResumen'),
          cuerpo: document.getElementById('modalCuerpo')
        };

        // Limpiar contenedores
        Object.values(containers).forEach(c => c.innerHTML = '');

        // Imagen
        const imgContainer = document.getElementById('modalImagenContainer');
        imgContainer.innerHTML = noticia.imagen
          ? `<img src="${noticia.imagen}" class="img-fluid rounded shadow-lg" style="max-height: 400px;" onerror="this.src='./img/No-Image-Placeholder.svg'">`
          : '';

        // Ajustar botón de cierre según el tema
        const isDark = document.body.getAttribute('data-theme') === 'dark';
        btnCerrar.className = isDark ? 'btn-close btn-close-white' : 'btn-close';

        // Preparar fragmentos y Spans
        const audioChunks = [];
        const allSpans = [];

        function addTextToModal(text, container) {
          if (!text) return;
          // Dividir por puntos, exclamaciones, interrogaciones o saltos de línea, manteniendo el delimitador
          const sentences = text.match(/[^.!?\n]+[.!?\n]*/g) || [text];

          sentences.forEach(s => {
            const cleanText = s.trim();
            if (cleanText.length > 0) {
              const span = document.createElement('span');
              span.className = 'tts-chunk';
              span.innerText = s; // Mantenemos el espacio original si lo hay
              container.appendChild(span);
              allSpans.push(span);
              audioChunks.push(cleanText);
            }
          });
        }

        addTextToModal(noticia.titular, containers.titular);
        addTextToModal(noticia.resumen, containers.resumen);
        addTextToModal(noticia.articulo, containers.cuerpo);

        // Detener cualquier lectura previa
        window.speechSynthesis.cancel();

        window.lastReadIndex = index;
        let chunkIndex = 0;
        let manualClose = false;

        // Mostrar el modal
        bsModal.show();

        // Manejo de cierre manual
        modalEl.addEventListener('hidden.bs.modal', function handler() {
          window.speechSynthesis.cancel();
          window.lastReadIndex = null;
          manualClose = true;
          modalEl.removeEventListener('hidden.bs.modal', handler);
        });

        function hablarSiguienteChunk() {
          if (manualClose || chunkIndex >= audioChunks.length || window.lastReadIndex !== index) {
            if (!manualClose && chunkIndex >= audioChunks.length) {
              const currentModal = bootstrap.Modal.getInstance(modalEl);
              if (currentModal) setTimeout(() => currentModal.hide(), 1000); // Pequeña pausa al final
            }
            return;
          }

          // Resaltado visual
          allSpans.forEach(s => s.classList.remove('tts-active'));
          const currentSpan = allSpans[chunkIndex];
          currentSpan.classList.add('tts-active');

          // Scroll suave hacia el texto activo si no es visible
          currentSpan.scrollIntoView({ behavior: 'smooth', block: 'center' });

          const utterance = new SpeechSynthesisUtterance(audioChunks[chunkIndex]);

          // Aplicar configuración personalizada
          const selectedVoiceName = document.getElementById('voiceSelect').value;
          const selectedVoice = voices.find(v => v.name === selectedVoiceName);
          if (selectedVoice) utterance.voice = selectedVoice;

          utterance.rate = document.getElementById('rateRange').value;
          utterance.pitch = document.getElementById('pitchRange').value;

          utterance.onend = () => {
            chunkIndex++;
            hablarSiguienteChunk();
          };

          utterance.onerror = (e) => {
            console.error('Error en TTS:', e);
            chunkIndex++;
            hablarSiguienteChunk();
          };

          window.speechSynthesis.speak(utterance);
        }

        setTimeout(hablarSiguienteChunk, 150);
      }

      function toggleTheme(checkbox) {
        if (checkbox.checked) {
          setTheme('dark');
        } else {
          setTheme('light');
        }
      }

      function setTheme(theme) {
        document.body.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        document.getElementById('checkbox').checked = (theme === 'dark');
      }

      // Cargar tema guardado
      const savedTheme = localStorage.getItem('theme') || 'dark';
      setTheme(savedTheme);

      function timeConverter(UNIX_timestamp){
        if (!UNIX_timestamp) return 'N/A';
        var a = new Date(UNIX_timestamp * 1000);
        var year = a.getFullYear();
        var month = (a.getMonth() + 1).toString().padStart(2, '0');
        var date = a.getDate().toString().padStart(2, '0');
        var hour = a.getHours().toString().padStart(2, '0');
        var min = a.getMinutes().toString().padStart(2, '0');
        return `${date}/${month}/${year} ${hour}:${min}`;
      }

      async function generarResumenConsolidado() {
        const modalEl = document.getElementById('modalResumenConsolidado');
        const bsModal = new bootstrap.Modal(modalEl);
        const loader = document.getElementById('resumenConsolidadoLoader');
        const content = document.getElementById('resumenConsolidadoContent');
        const btnEscucharTodo = document.getElementById('btnEscucharTodoResumen');
        
        loader.style.display = 'block';
        loader.querySelector('h4').innerText = 'Consolidando portadas en vivo...';
        loader.querySelector('p').innerText = 'Iniciando scraping de todos los medios...';
        
        content.style.display = 'flex';
        content.innerHTML = '';
        btnEscucharTodo.style.display = 'none';
        
        bsModal.show();
        
        const selectMedios = document.getElementById('medios');
        const options = Array.from(selectMedios.options);
        
        const portadas = [];
        window.consolidatedNews = [];
        
        const maxConcurrencia = 3;
        let indexMedio = 0;
        
        function agregarTarjetaAlModal(medioName, n, index) {
          const cardHtml = `
            <div class="col" id="card-consolidada-${index}">
              <div class="card h-75 shadow-sm border border-secondary-subtle" style="background-color: rgba(255,255,255,0.03); color: var(--text-color);">
                ${n.imagen ? `<img src="${n.imagen}" class="card-img-top object-fit-cover" style="height: 180px;" alt="${n.titular}" onerror="this.src='./img/No-Image-Placeholder.svg'">` : `<img src="./img/No-Image-Placeholder.svg" class="card-img-top object-fit-cover" style="height: 180px;" alt="No Image">`}
                <div class="card-body d-flex flex-column">
                  <span class="btn btn-night btn-lg align-self-start mb-2">${medioName}</span>
                  <h5 class="card-title fw-bold">${n.titular}</h5>
                  <p class="card-text text-secondary flex-grow-1">${n.resumen || n.articulo.slice(0, 150) + '...'}</p>
                  <div class="d-flex justify-content-between align-items-center mt-3 pt-2 border-top border-secondary-subtle">
                    <small class="text-secondary">${n.fechaArticulo || timeConverter(n.fechaObtenido)}</small>
                    <div class="d-flex gap-2">
                      <button class="btn btn-outline-night btn-sm" onclick="escucharNoticiaConsolidada(${index})" title="Escuchar noticia">🔊 Escuchar</button>
                      <a href="${n.link}" target="_blank" class="btn btn-outline-light btn-sm">Original ↗️</a>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          `;
          content.innerHTML += cardHtml;
        }

        async function procesarSiguiente() {
          if (indexMedio >= options.length) return;
          const opt = options[indexMedio++];
          const value = opt.value;
          const name = opt.text;
          
          loader.querySelector('p').innerText = `Actualizando en vivo: ${name} (${indexMedio} de ${options.length})...`;
          
          try {
            // Disparar scraping en tiempo real de la primera noticia
            const scrapResponse = await fetch(`/api/scrap/${value}?limit=1`);
            await scrapResponse.json();
            
            // Leer el archivo recién actualizado
            const dataResponse = await fetch(`./json/${value}?t=${Date.now()}`);
            if (dataResponse.ok) {
              const data = await dataResponse.json();
              if (data && data.length > 0) {
                const itemIndex = portadas.length;
                portadas.push(data[0]);
                window.consolidatedNews.push(data[0]);
                agregarTarjetaAlModal(name, data[0], itemIndex);
              }
            }
          } catch (e) {
            console.warn(`No se pudo obtener noticia en vivo para ${name}:`, e.message);
          }
          
          await procesarSiguiente();
        }
        
        // Ejecutar trabajadores en paralelo (límite de concurrencia)
        const trabajadores = [];
        for (let i = 0; i < Math.min(maxConcurrencia, options.length); i++) {
          trabajadores.push(procesarSiguiente());
        }
        await Promise.all(trabajadores);
        
        loader.style.display = 'none';
        
        if (portadas.length === 0) {
          content.innerHTML = '<div class="col-12 text-center my-5"><h4 class="text-secondary">No se pudo obtener ninguna noticia en tiempo real.</h4></div>';
        } else {
          btnEscucharTodo.style.display = 'inline-block';
        }
      }

      function escucharNoticiaConsolidada(index) {
        const tempNews = window.currentNews;
        window.currentNews = window.consolidatedNews;
        
        leerNoticia(index);
        
        const modalEl = document.getElementById('modalLectura');
        const restoreHandler = () => {
          window.currentNews = tempNews;
          modalEl.removeEventListener('hidden.bs.modal', restoreHandler);
        };
        modalEl.addEventListener('hidden.bs.modal', restoreHandler);
      }

      function escucharTodoElResumen() {
        if (!window.consolidatedNews || window.consolidatedNews.length === 0) return;
        
        const textoConsolidado = window.consolidatedNews.map((n) => {
          const medioLabel = n.medio || 'Medio Desconocido';
          return `En ${medioLabel}. ${n.titular}. ${n.resumen || n.articulo.slice(0, 150) + '...'}`;
        }).join('\n\n');
        
        const noticiaFicticia = {
          titular: "Resumen Completo de Portadas",
          resumen: `Consolidado de las primeras noticias de los ${window.consolidatedNews.length} medios disponibles.`,
          articulo: textoConsolidado,
          imagen: ''
        };
        
        const tempNews = window.currentNews;
        window.currentNews = [noticiaFicticia];
        
        leerNoticia(0);
        
        const modalEl = document.getElementById('modalLectura');
        const restoreHandler = () => {
          window.currentNews = tempNews;
          modalEl.removeEventListener('hidden.bs.modal', restoreHandler);
        };
        modalEl.addEventListener('hidden.bs.modal', restoreHandler);
      }
    </script>
  </body>
</html>
