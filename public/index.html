<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="News Scrapper - Noticias actualizadas on-demand">
    <meta name="author" content="Juan Maioli">
    <title>News Scrapper</title>

    <!-- Bootstrap core CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css">

    <!-- Google Fonts-->
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

    <!-- Favicon Emoji -->
    <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📰</text></svg>">
    <style>
      :root {
        --bg-color: #111;
        --text-color: #ddd;
        --card-bg: #333;
        --header-footer-bg: #222;
        --muted-text: #6c757d;
        --border-gradient: radial-gradient(circle at top left, #f00, #3020ff);
        --hero-gradient: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      }

      [data-theme="light"] {
        --bg-color: #f8f9fa;
        --text-color: #212529;
        --card-bg: #ffffff;
        --header-footer-bg: #e9ecef;
        --muted-text: #6c757d;
        --border-gradient: radial-gradient(circle at top left, #ff7e5f, #feb47b);
        --hero-gradient: linear-gradient(135deg, #e9ecef 0%, #dee2e6 100%);
      }

      .card-body::-webkit-scrollbar {width: 6px;}
      .card-body::-webkit-scrollbar-thumb {background: rgb(98, 98, 98);border-radius: 3px;}
      .card-body::-webkit-scrollbar-thumb:hover {background:  #ddd;}
      .card-body::-webkit-scrollbar-track {background: var(--card-bg);}
      .card-body{background-color: var(--card-bg);}
      .card-footer{background-color: var(--header-footer-bg);}
      .card-header{background-color: var(--header-footer-bg);}
      .card{
        min-height: 700px;
        max-height: 700px;
        border: double 2px transparent;
        border-radius: 8px;
        background-image: linear-gradient(var(--card-bg), var(--card-bg)), var(--border-gradient);
        background-origin: border-box;
        background-clip: padding-box, border-box;
        transition: transform 0.2s, background-image 0.3s;
      }
      .card:hover { transform: translateY(-5px); }
      body{background-color: var(--bg-color); color: var(--text-color); font-family: 'Roboto', sans-serif; transition: background-color 0.3s, color 0.3s;}
      
      #loader {
        display: none;
        text-align: center;
        padding: 20px;
      }
      .spinner-border {
        width: 3rem;
        height: 3rem;
      }
      .hero-section {
        background: var(--hero-gradient);
        padding: 60px 0;
        border-bottom: 1px solid #34495e;
        transition: background 0.3s;
      }

      /* Switch de Tema */
      .theme-switch-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-top: 15px;
      }
      .theme-switch {
        display: inline-block;
        height: 28px;
        position: relative;
        width: 50px;
      }
      .theme-switch input { display: none; }
      .slider {
        background-color: #ccc;
        bottom: 0;
        cursor: pointer;
        left: 0;
        position: absolute;
        right: 0;
        top: 0;
        transition: .4s;
        border-radius: 34px;
      }
      .slider:before {
        background-color: white;
        bottom: 4px;
        content: "";
        height: 20px;
        left: 4px;
        position: absolute;
        transition: .4s;
        width: 20px;
        border-radius: 50%;
      }
      input:checked + .slider { background-color: #2196F3; }
      input:checked + .slider:before { transform: translateX(22px); }
      .emoji-toggle { font-size: 1.2rem; cursor: pointer; }

      /* Mejora del Select */
      .input-group-text {
        background-color: var(--header-footer-bg);
        color: var(--text-color);
        border: 1px solid rgba(128, 128, 128, 0.2);
        font-weight: 500;
      }
      .form-select {
        background-color: var(--card-bg);
        color: var(--text-color);
        border: 1px solid rgba(128, 128, 128, 0.2);
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .form-select:focus {
        background-color: var(--card-bg);
        color: var(--text-color);
        border-color: #2196F3;
        box-shadow: 0 0 0 0.25rem rgba(33, 150, 243, 0.25);
      }
      .form-select:hover {
        border-color: rgba(33, 150, 243, 0.5);
      }
      option {
        background-color: var(--card-bg);
        color: var(--text-color);
      }
    </style>
  </head>
  <body class="container-fluid" data-theme="dark">
      <!-- Header Hero -->
  <div class="hero-section text-center shadow mb-5">
    <div class="container position-relative">
      <h1 class="display-3 fw-bold mb-3">📰 News Scrapper</h1>
      
      <!-- Switch de Tema -->
      <div class="theme-switch-wrapper mb-4">
        <span class="emoji-toggle" onclick="setTheme('light')">☀️</span>
        <label class="theme-switch" for="checkbox">
          <input type="checkbox" id="checkbox" onchange="toggleTheme(this)" />
          <div class="slider"></div>
        </label>
        <span class="emoji-toggle" onclick="setTheme('dark')">🌙</span>
      </div>
    </div>
    
    <div class="row mt-2 mb-4 align-items-center justify-content-center">
      <div class="col-md-3"></div>
      <div class="col-md-3">
        <p class="small opacity-75">Actualización automática al cambiar de medio</p>
      </div>
      <div class="col-md-3">
        <div class="input-group shadow-lg">
          <label class="input-group-text" for="medios">
             🌐 Medio
          </label>
          <select id="medios" class="form-select form-select-lg" onchange="actualizarYMostrar(this.value)">
            <option value="cnnespanol.json">🌎 CNN en Español</option>
            <option value="cronista.json">📈 El Cronista</option>
            <option value="elpais.json">🌍 El País</option>
            <option value="googlenews.json">🔍 Google News</option>
            <option value="infobae.json" selected>🗞️ Infobae</option>
            <option value="lanacion.json">🏛️ La Nacion</option>
            <option value="lmneuquen.json">🏔️ Lmneuquen</option>
            <option value="ole.json">⚽ Olé</option>
            <option value="perfil.json">🖋️ Perfil</option>
            <option value="rionegro.json">🍎 Río Negro</option>
          </select>
        </div>
      </div>
            <div class="col-md-3"></div>
    </div>
  </div>


    <div id="loader">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Cargando...</span>
      </div>
      <h4 class="mt-3">Actualizando noticias...</h4>
      <p class="">Esto puede tardar unos segundos</p>
    </div>

    <div id="noticias" class="row"></div>

    <!-- Modal de Lectura Fullscreen -->
    <div class="modal fade" id="modalLectura" tabindex="-1" aria-labelledby="modalLecturaLabel" aria-hidden="true">
      <div class="modal-dialog modal-fullscreen">
        <div class="modal-content" style="background-color: var(--bg-color); color: var(--text-color);">
          <div class="modal-header border-bottom-0">
            <h5 class="modal-title" id="modalLecturaLabel">Escuchando Noticia</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close" id="btnCerrarModal"></button>
          </div>
          <div class="modal-body text-center p-5">
            <div class="container" style="max-width: 800px;">
              <h1 id="modalTitular" class="display-4 mb-4 fw-bold"></h1>
              <div id="modalImagenContainer" class="mb-4"></div>
              <p id="modalResumen" class="lead mb-4 opacity-75 italic"></p>
              <hr class="my-5 opacity-25">
              <div id="modalCuerpo" class="fs-4 text-start" style="line-height: 1.6;"></div>
              
              <div class="mt-5 pt-5">
                <div class="spinner-grow text-warning" role="status">
                  <span class="visually-hidden">Leyendo...</span>
                </div>
                <p class="mt-2 text-warning fw-bold">Reproduciendo audio...</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      // Carga inicial
      actualizarYMostrar(document.getElementById('medios').value)

      async function actualizarYMostrar(medio) {
        const noticiasContainer = document.querySelector('#noticias')
        const loader = document.querySelector('#loader')
        
        // 1. Mostrar loader y limpiar contenedor
        noticiasContainer.innerHTML = ''
        loader.style.display = 'block'
        
        try {
          // 2. Disparar el scraping asíncrono en el servidor
          console.log('Solicitando actualización asíncrona para:', medio)
          const scrapResponse = await fetch(`/api/scrap/${medio}`)
          const scrapResult = await scrapResponse.json()
          
          if (!scrapResponse.ok) throw new Error(scrapResult.error)
          
          console.log('Servidor procesando:', scrapResult.message)

          // 3. Esperar solo si es una actualización nueva
          if (scrapResult.status === 'started') {
            await new Promise(resolve => setTimeout(resolve, 5000))
          }

          // 4. Intentar obtener los nuevos datos del JSON
          const dataResponse = await fetch(`./json/${medio}?t=${Date.now()}`) // Cache busting
          const ultimasNoticias = await dataResponse.json()
          
          // 5. Renderizar
          renderizarNoticias(ultimasNoticias)
        } catch (error) {
          console.error('Error:', error)
          noticiasContainer.innerHTML = `
            <div class="col-12 text-center mt-5">
              <div class="alert alert-danger">
                Error al actualizar las noticias: ${error.message}
              </div>
            </div>`
        } finally {
          loader.style.display = 'none'
        }
      }

      function renderizarNoticias(ultimasNoticias) {
        const noticiasContainer = document.querySelector('#noticias')
        const resultados = ultimasNoticias.length
        
        if (resultados === 0) {
          noticiasContainer.innerHTML = '<div class="col-12 text-center mt-5"><h4>No se encontraron noticias recientes para este medio.</h4></div>'
          return
        }

        // Guardar las noticias globalmente para que la función de lectura pueda acceder a ellas
        window.currentNews = ultimasNoticias;

        let htmlContent = ''
        for(let i = 0; i < ultimasNoticias.length; i++){
          const noticia = ultimasNoticias[i];
          let imagenNoticia = ''
          const botones = `
            <div class="d-flex gap-1 justify-content-end">
              <button onclick="leerNoticia(${i})" class="btn btn-outline-warning btn-sm" title="Escuchar noticia">🔊</button>
              <a href='${noticia.link}' class="btn btn-outline-primary btn-sm" target="_blank">Ver</a>
              <a href='https://www.google.com/search?q=${encodeURIComponent(noticia.titular)}' class="btn btn-outline-info btn-sm" target="_blank">Buscar</a>
            </div>`
          
          if(noticia.imagen){
            imagenNoticia = `<div class="col"><img src="${noticia.imagen}" class="img-fluid rounded" alt="${noticia.titular}" onerror="this.src='./img/No-Image-Placeholder.svg'"></div>`
          } else {
            imagenNoticia = `<div class="col"><img src="./img/No-Image-Placeholder.svg" class="img-fluid rounded" alt="Sin imagen"></div>`
          }
          
          htmlContent += `
            <div class="col-md-3 mb-4">
              <div class="card">
                <div class="card-header">
                  <div class="row align-items-center">
                    <div class="col-6">
                      <h5 class="mb-0 small">${noticia.medio}</h5>
                      <span class="fst-italic smaller text-muted">${noticia.fechaArticulo || 'Sin fecha'}</span>
                    </div>
                    <div class="col-6 p-0">
                      ${botones}
                    </div>
                  </div>
                </div>
                <div class="card-body overflow-auto">
                  <h4 class="h5">${noticia.titular}</h4>
                  <p class="small text-secondary mb-3">${noticia.resumen || ''}</p>
                  <div class="row mb-3">
                    ${imagenNoticia}
                  </div>
                  <p class="small">${noticia.articulo.slice(0, 350)}...</p>
                </div>
                <div class="card-footer">
                  <div class="d-flex justify-content-between align-items-center">
                    <span class="smaller text-muted">${noticia.indice} de ${resultados}</span>
                    <span class="smaller text-muted">Visto: ${timeConverter(noticia.fechaObtenido)}</span>
                  </div>
                </div>
              </div>
            </div>`
        }
        noticiasContainer.innerHTML = htmlContent
      }

      function leerNoticia(index) {
        if (!window.currentNews || !window.currentNews[index]) return;
        
        const noticia = window.currentNews[index];
        const modalEl = document.getElementById('modalLectura');
        const bsModal = new bootstrap.Modal(modalEl);
        const btnCerrar = document.getElementById('btnCerrarModal');

        // Configurar contenido del modal
        document.getElementById('modalTitular').innerText = noticia.titular;
        document.getElementById('modalResumen').innerText = noticia.resumen || '';
        document.getElementById('modalCuerpo').innerText = noticia.articulo;
        const imgContainer = document.getElementById('modalImagenContainer');
        imgContainer.innerHTML = noticia.imagen 
          ? `<img src="${noticia.imagen}" class="img-fluid rounded shadow-lg" style="max-height: 400px;" onerror="this.src='./img/No-Image-Placeholder.svg'">`
          : '';

        // Ajustar botón de cierre según el tema
        const isDark = document.body.getAttribute('data-theme') === 'dark';
        btnCerrar.className = isDark ? 'btn-close btn-close-white' : 'btn-close';

        // Detener cualquier lectura previa
        window.speechSynthesis.cancel();
        
        const textoCompleto = `${noticia.titular}. ${noticia.resumen || ''}. ${noticia.articulo}`;
        const chunks = textoCompleto.split(/[\.\!\?\n]+/).filter(t => t.trim().length > 0);
        
        window.lastReadIndex = index;
        let chunkIndex = 0;
        let manualClose = false;

        // Mostrar el modal
        bsModal.show();

        // Si el usuario cierra el modal manualmente, detenemos la voz
        modalEl.addEventListener('hidden.bs.modal', function handler() {
          window.speechSynthesis.cancel();
          window.lastReadIndex = null;
          manualClose = true;
          modalEl.removeEventListener('hidden.bs.modal', handler);
        });

        function hablarSiguienteChunk() {
          if (manualClose || chunkIndex >= chunks.length || window.lastReadIndex !== index) {
            if (!manualClose && chunkIndex >= chunks.length) {
              // Si terminó de leer todo, cerramos el modal automáticamente
              const currentModal = bootstrap.Modal.getInstance(modalEl);
              if (currentModal) currentModal.hide();
            }
            return;
          }

          const utterance = new SpeechSynthesisUtterance(chunks[chunkIndex].trim());
          utterance.lang = 'es-AR';
          utterance.rate = 1.1;
          
          utterance.onend = () => {
            chunkIndex++;
            hablarSiguienteChunk();
          };

          utterance.onerror = (e) => {
            console.error('Error en TTS:', e);
            chunkIndex++;
            hablarSiguienteChunk();
          };

          window.speechSynthesis.speak(utterance);
        }

        setTimeout(hablarSiguienteChunk, 100);
      }

      function toggleTheme(checkbox) {
        if (checkbox.checked) {
          setTheme('dark');
        } else {
          setTheme('light');
        }
      }

      function setTheme(theme) {
        document.body.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        document.getElementById('checkbox').checked = (theme === 'dark');
      }

      // Cargar tema guardado
      const savedTheme = localStorage.getItem('theme') || 'dark';
      setTheme(savedTheme);

      function timeConverter(UNIX_timestamp){
        if (!UNIX_timestamp) return 'N/A';
        var a = new Date(UNIX_timestamp * 1000);
        var year = a.getFullYear();
        var month = (a.getMonth() + 1).toString().padStart(2, '0');
        var date = a.getDate().toString().padStart(2, '0');
        var hour = a.getHours().toString().padStart(2, '0');
        var min = a.getMinutes().toString().padStart(2, '0');
        return `${date}/${month}/${year} ${hour}:${min}`;
      }
    </script>
  </body>
</html>
